
<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מחשבון זכויות בנייה</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><link rel="stylesheet" href="style.css">
</head><body><main><h1>מחשבון תכסית ואחוזי בנייה</h1><div class="grid"><section><h2>נתוני תכנון</h2><div class="fields" id="inputs"></div><h2 style="margin-top:25px">קווי בניין <span class="unit">(מ׳)</span></h2><div class="fields" id="setbacks"></div></section><section><h2>תוצאות</h2><div class="results"><div class="row"><span>תכסית מקסימלית</span><b id="max" class="value"></b></div><div class="row"><span>בנייה עילית מותרת</span><b id="allow" class="value"></b></div><div class="row"><span>שטח לקומה</span><b id="floor" class="value"></b></div><div class="row"><span>שטח שנותר לניצול</span><b id="left" class="value"></b></div></div><div style="margin-top:20px;display:flex;justify-content:space-between"><b>ניצול זכויות</b><b id="use"></b></div><div class="bar"><span id="bar"></span></div><div id="alert" class="alert"></div><h2>השוואת חלופות</h2><table><thead><tr><th>חלופה</th><th>שטח עילי</th><th>ניצול</th><th>סטטוס</th></tr></thead><tbody id="options"></tbody></table><h2 style="margin-top:26px">קווי בניין על המגרש</h2><svg viewBox="0 0 440 290" role="img" aria-label="שרטוט סכמטי של מגרש וקווי בניין"><rect class="lot" x="55" y="32" width="330" height="210"/><rect class="env" id="env" x="110" y="80" width="220" height="115"/><text x="220" y="62" text-anchor="middle">גבול מגרש</text><text x="220" y="143" text-anchor="middle">מעטפת בנייה</text><text id="frontT" x="400" y="55"></text><text id="rearT" x="325" y="270" text-anchor="middle"></text><text id="sideT" x="65" y="22"></text></svg><button id="pdf">הפקת PDF סיכום אתר</button><div id="note" class="sub"></div></section></div></main><style>#layouts [data-option]{display:grid;gap:0}#layouts [data-option]>.row{display:grid;grid-template-columns:92px 1fr;gap:8px;width:100%;border:1px solid #ddd;padding:8px;align-items:center}#layouts [data-option]>.row span{display:flex;gap:6px;flex-wrap:wrap}#layouts [data-option]>.row input{width:74px;padding:7px}#layouts [data-option]>.sub{margin-top:8px}@media(max-width:450px){#layouts
