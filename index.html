<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מחשבון זכויות בנייה</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><style>
*{box-sizing:border-box}body{margin:0;background:#fff;color:#252525;font:16px Rubik,sans-serif}main{max-width:1120px;margin:auto;padding:32px 20px}h1,h2{font-weight:500}h1{margin:0 0 28px;font-size:26px}h2{font-size:19px;margin:0 0 16px}.grid{display:grid;grid-template-columns:340px 1fr;gap:48px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:15px}.field{display:grid;gap:6px}label{font-weight:500}input{width:100%;border:1px solid #aaa;border-radius:0;padding:9px;font:inherit;text-align:right;background:#fff}.unit,.sub{color:#666;font-weight:400}.results{border-top:2px solid #252525}.row{display:grid;grid-template-columns:1fr auto;padding:12px 0;border-bottom:1px solid #ddd;gap:10px}.value{font-weight:500;white-space:nowrap}.bar{height:18px;background:#eee;margin-top:8px}.bar span{display:block;height:100%;background:#252525;transition:width .15s}.alert{min-height:24px;margin-top:15px;font-weight:500}.warn{color:#6f1d2a}table{width:100%;border-collapse:collapse}th,td{padding:10px 6px;border-bottom:1px solid #ddd;text-align:right}th{font-weight:500}svg{display:block;width:100%;max-width:430px;margin:auto}.lot{fill:#f4f4f4;stroke:#252525;stroke-width:1.5}.env{fill:#fff;stroke:#252525;stroke-width:1.5}.guide{stroke:#777}svg text{font-family:Rubik,sans-serif;font-size:12px;fill:#252525}button{margin-top:22px;border:1px solid #252525;border-radius:0;background:#252525;color:#fff;padding:10px 14px;font:inherit;cursor:pointer}@media(max-width:700px){.grid{grid-template-columns:1fr;gap:30px}}@media(max-width:380px){.fields{grid-template-columns:1fr}}
</style></head><body><main><h1>מחשבון תכסית ואחוזי בנייה</h1><div class="grid"><section><h2>נתוני תכנון</h2><div class="fields" id="inputs"></div><h2 style="margin-top:25px">קווי בניין <span class="unit">(מ׳)</span></h2><div class="fields" id="setbacks"></div></section><section><h2>תוצאות</h2><div class="results"><div class="row"><span>תכסית מקסימלית</span><b id="max" class="value"></b></div><div class="row"><span>בנייה עילית מותרת</span><b id="allow" class="value"></b></div><div class="row"><span>שטח לקומה</span><b id="floor" class="value"></b></div><div class="row"><span>שטח שנותר לניצול</span><b id="left" class="value"></b></div></div><div style="margin-top:20px;display:flex;justify-content:space-between"><b>ניצול זכויות</b><b id="use"></b></div><div class="bar"><span id="bar"></span></div><div id="alert" class="alert"></div><h2>השוואת חלופות</h2><table><thead><tr><th>חלופה</th><th>שטח עילי</th><th>ניצול</th><th>סטטוס</th></tr></thead><tbody id="options"></tbody></table><h2 style="margin-top:26px">קווי בניין על המגרש</h2><svg viewBox="0 0 440 290" role="img" aria-label="שרטוט סכמטי של מגרש וקווי בניין"><rect class="lot" x="55" y="32" width="330" height="210"/><rect class="env" id="env" x="110" y="80" width="220" height="115"/><text x="220" y="62" text-anchor="middle">גבול מגרש</text><text x="220" y="143" text-anchor="middle">מעטפת בנייה</text><text id="frontT" x="400" y="55"></text><text id="rearT" x="325" y="270" text-anchor="middle"></text><text id="sideT" x="65" y="22"></text></svg><button id="pdf">הפקת PDF סיכום אתר</button><div id="note" class="sub"></div></section></div></main><script>
const specs=[['lot','שטח מגרש','מ״ר',500],['coverage','תכסית מותרת','%',40],['rights','אחוזי בנייה','%',120],['floors','קומות מבוקשות','',3],['parking','חניון תת־קרקעי','מ״ר',0]],set=[['front','קדמי',5],['rear','אחורי',3],['side','צדדי',3]],by=id=>document.getElementById(id),fmt=new Intl.NumberFormat('he-IL',{maximumFractionDigits:1});
function field(a,target){by(target).insertAdjacentHTML('beforeend',`<div class="field"><label for="${a[0]}">${a[1]} <span class="unit">${a[2]||''}</span></label><input id="${a[0]}" type="number" min="0" value="${a[a.length-1]}" inputmode="decimal"></div>`)}specs.forEach(x=>field(x,'inputs'));set.forEach(x=>field([x[0],x[1],'מ׳',x[2]],'setbacks'));const n=id=>Math.max(0,+by(id).value||0),sqm=x=>fmt.format(x)+' מ״ר';let d={};
function calc(){let lot=n('lot'),max=lot*n('coverage')/100,allow=lot*n('rights')/100,f=Math.max(1,Math.floor(n('floors')||1)),plan=max*f,left=allow-plan,use=allow?plan/allow*100:0;d={lot,max,allow,f,plan,left,use,parking:n('parking'),front:n('front'),rear:n('rear'),side:n('side')};by('max').textContent=sqm(max);by('allow').textContent=sqm(allow);by('floor').textContent=sqm(max);by('left').textContent=sqm(Math.abs(left))+(left<0?' חריגה':' לניצול');by('use').textContent=fmt.format(use)+'%';by('bar').style.width=Math.min(100,use)+'%';by('bar').style.background=left<0?'#6f1d2a':'#252525';by('alert').textContent=left<0?'חריגה של '+sqm(-left)+' מזכויות הבנייה.':'החלופה המבוקשת עומדת בזכויות שהוזנו.';by('alert').className='alert '+(left<0?'warn':'');by('options').innerHTML=[3,5].map(f=>{let a=max*f,u=allow?a/allow*100:0;return`<tr><td>${f} קומות</td><td>${sqm(a)}</td><td>${fmt.format(u)}%</td><td class="${a>allow?'warn':''}">${a>allow?'חריגה':'תקין'}</td></tr>`}).join('');let s=Math.min(14,270/Math.max(1,d.front+d.rear+2*d.side+10)),x=55+d.side*s,y=32+d.front*s,w=Math.max(8,330-2*d.side*s),h=Math.max(8,210-(d.front+d.rear)*s);['x','y','width','height'].forEach((k,i)=>by('env').setAttribute(k,[x,y,w,h][i]));by('frontT').textContent='קדמי '+fmt.format(d.front)+' מ׳';by('rearT').textContent='אחורי '+fmt.format(d.rear)+' מ׳';by('sideT').textContent='צדדי '+fmt.format(d.side)+' מ׳'}
document.querySelectorAll('input').forEach(i=>i.addEventListener('input',calc));by('pdf').onclick=()=>{if(!window.jspdf){by('note').textContent='לא ניתן לטעון PDF כרגע.';return}let p=new window.jspdf.jsPDF();p.setFont('helvetica');p.setFontSize(18);p.text('Site rights summary',20,22);['Lot area: '+fmt.format(d.lot)+' sqm','Maximum coverage: '+fmt.format(d.max)+' sqm','Allowed above-ground area: '+fmt.format(d.allow)+' sqm','Requested floors: '+d.f,'Proposed area: '+fmt.format(d.plan)+' sqm','Rights utilization: '+fmt.format(d.use)+'%','Remaining/exceedance: '+fmt.format(Math.abs(d.left))+' sqm','Parking: '+fmt.format(d.parking)+' sqm','Setbacks: front '+d.front+'m, rear '+d.rear+'m, side '+d.side+'m'].forEach((t,i)=>p.text(t,20,42+i*10));p.save('site-rights-summary.pdf');by('note').textContent='קובץ ה־PDF הופק.'};calc();
</script></body></html>
